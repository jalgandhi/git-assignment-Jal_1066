<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Registration Form</title>
</head>
<body>

<form method="post" action="submit.html">

    <fieldset>
        <legend>User Registration Form</legend>
        <fieldset>
            <legend>Personal Information</legend>

            <label for="fullname">Full Name (FirstName_LastName):</label><br>
            <input type="text" id="fullname" name="fullname"
                   pattern="[A-Za-z]+_[A-Za-z]+"
                   placeholder="Jal Gandhi"
                   required><br><br>

            <label for="about">About Yourself:</label><br>
            <textarea id="about" name="about" rows="5" cols="50"></textarea><br><br>

            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="password">Password (Minimum 8 characters):</label><br>
            <input type="password" id="password" name="password"
                   minlength="8" required><br><br>

            <label for="phone">Phone Number (10 digits):</label><br>
            <input type="tel" id="phone" name="phone"
                   pattern="[0-9]{10}" required><br><br>

            <label for="website">Website (Optional):</label><br>
            <input type="url" id="website" name="website"><br><br>

        </fieldset>

        <fieldset>
            <legend>Skills & Preferences</legend>

            <label>Skills:</label><br>
            <input type="checkbox" id="html" name="skills" value="HTML" checked>
            <label for="html">HTML</label><br>

            <input type="checkbox" id="css" name="skills" value="CSS">
            <label for="css">CSS</label><br>

            <input type="checkbox" id="js" name="skills" value="JavaScript">
            <label for="js">JavaScript</label><br><br>

            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="Male" checked>
            <label for="male">Male</label><br>

            <input type="radio" id="female" name="gender" value="Female">
            <label for="female">Female</label><br><br>

            <label for="color">Preferred Color:</label><br>
            <input type="color" id="color" name="color" value="#1111ff"><br><br>

            <label for="experience">Experience Level (0-10):</label><br>
            <input type="range" id="experience" name="experience"
                   min="0" max="10" step="2"><br><br>

            <label for="search">Search Interest (Optional):</label><br>
            <input type="search" id="search" name="search"><br><br>

        </fieldset>

        <fieldset>
            <legend>Date & Time</legend>

            <label for="dob">Date of Birth:</label><br>
            <input type="date" id="dob" name="dob"
                   max="2005-12-31" required><br><br>

            <label for="time">Available Time (9:00 AM - 6:30 PM):</label><br>
            <input type="time" id="time" name="time"
                   min="09:00" max="18:30"><br><br>

            <label for="joining">Joining Month:</label><br>
            <input type="date" id="joining" name="joining"
                   value="2026-01-09"><br><br>

            <label for="week">Training Week:</label><br>
            <input type="week" id="week" name="week"
                   value="2026-W07" readonly><br><br>

            <label for="datetime">Interview Slot:</label><br>
            <input type="datetime-local" id="datetime" name="datetime"><br><br>

        </fieldset>
        <fieldset>
            <legend>Technology & Resume</legend>

            <label for="technology">Technology:</label><br>
            <select id="technology" name="technology">
                <option value=".Net">.Net</option>
                <option value="Angular">Java</option>
                <option value="Java">ReactJS</option>
                <option value="ReactJS">angular</option>
                <option value="QA">QA</option>
            </select><br><br>

            <label for="resume">Resume Upload (PDF only):</label><br>
            <input type="file" id="resume" name="resume"
                   accept="application/pdf"><br><br>

        </fieldset>


    <fieldset>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
        <input type="button" value="Click Me">

    </fieldset>

</form>

</body>
</html>
